name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate skeleton
        run: python scripts/validate_connector.py

      - name: Run tests
        run: python -m pytest -q

      - name: Compile Python
        run: python -m compileall -q src scripts

      - name: Run offline starter proof
        run: aoa-4pda proof starter

      - name: Run no-network discovery audit
        run: aoa-4pda discovery audit xiaomi-13t

      - name: Run no-network discovery review
        run: aoa-4pda discovery review xiaomi-13t

      - name: Run no-network coverage audit
        run: aoa-4pda coverage audit xiaomi-13t

      - name: Run no-network refresh audit
        run: aoa-4pda refresh audit xiaomi-13t

      - name: Materialize no-network fixture
        run: |
          aoa-4pda storage status
          aoa-4pda materialize fixture
          aoa-4pda answer "bootloop recovery.img camellia" --run starter-fixture

      - name: Run starter search eval
        run: aoa-4pda eval search-quality

      - name: Run starter graph relation eval
        run: aoa-4pda eval graph-relations

      - name: Run starter graph query packet eval
        run: aoa-4pda eval graph-query-packets

      - name: Run starter hybrid query packet eval
        run: aoa-4pda eval hybrid-query-packets

      - name: Run starter answer packet eval
        run: aoa-4pda eval answer-packets

      - name: Verify agent install route from fresh copy
        run: python scripts/verify_agent_install_route.py --skip-pytest

      - name: Guard against committed heavy artifacts
        run: |
          python - <<'PY'
          import subprocess

          forbidden = {"data", "cache", "artifacts", "raw", "indexes", "vectors", "graphs"}
          allowed_scaffold = {
            ".connector-state/data/.gitkeep",
            ".connector-state/cache/.gitkeep",
            ".connector-state/artifacts/.gitkeep",
            "kag/indexes/source_inventory.json",
            "kag/indexes/source_surface_index.json",
        }
          hits = []
          tracked = subprocess.check_output(["git", "ls-files"], text=True).splitlines()
          for rel in tracked:
              if rel in allowed_scaffold:
                  continue
              if any(part in forbidden for part in rel.split("/")):
                  hits.append(rel)
          if hits:
              print("tracked forbidden artifact paths:")
              for hit in hits:
                  print(f"- {hit}")
              raise SystemExit(1)
          PY
