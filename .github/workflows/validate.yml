name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      AOA_STATS_REVISION: ae87240bd5f1b64769fcf39b4eae67363cee9f38
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check repo-local KAG index family
        uses: 8Dionysus/aoa-kag/.github/actions/repo-local-kag-index@da9f50a581645b2173b99dbf771a63d447ec2fec
        with:
          history-ref: ${{ github.event.pull_request.base.sha || github.event.before || format('{0}^', github.sha) }}
          event-history-ref: ${{ github.event.pull_request.base.sha || github.event.before || format('{0}^', github.sha) }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Fetch pinned aoa-stats contract owner
        env:
          AOA_STATS_ROOT: ${{ runner.temp }}/aoa-stats
        run: |
          git init --quiet "$AOA_STATS_ROOT"
          git -C "$AOA_STATS_ROOT" fetch --quiet --no-tags --depth=1 https://github.com/8Dionysus/aoa-stats.git "$AOA_STATS_REVISION"
          git -C "$AOA_STATS_ROOT" checkout --quiet --detach FETCH_HEAD
          test "$(git -C "$AOA_STATS_ROOT" rev-parse HEAD)" = "$AOA_STATS_REVISION"

      - name: Install pinned stats validation dependencies
        env:
          AOA_STATS_ROOT: ${{ runner.temp }}/aoa-stats
        run: python -m pip install --disable-pip-version-check -r "$AOA_STATS_ROOT/requirements-dev.txt"

      - name: Validate local stats port
        env:
          AOA_STATS_ROOT: ${{ runner.temp }}/aoa-stats
        run: python scripts/validate_local_stats_port.py

      - name: Validate skeleton
        run: python scripts/validate_connector.py

      - name: Run tests
        run: python -m pytest -q

      - name: Compile Python
        run: python -m compileall -q src scripts

      - name: Run offline starter proof
        run: aoa-4pda proof starter

      - name: Run no-network discovery audit
        run: aoa-4pda discovery audit xiaomi-13t

      - name: Run no-network discovery review
        run: aoa-4pda discovery review xiaomi-13t

      - name: Run no-network coverage audit
        run: aoa-4pda coverage audit xiaomi-13t

      - name: Run no-network refresh audit
        run: aoa-4pda refresh audit xiaomi-13t

      - name: Materialize no-network fixture
        run: |
          aoa-4pda storage status
          aoa-4pda materialize fixture
          aoa-4pda answer "bootloop recovery.img camellia" --run starter-fixture

      - name: Run starter search eval
        run: aoa-4pda eval search-quality

      - name: Run starter graph relation eval
        run: aoa-4pda eval graph-relations

      - name: Run starter graph query packet eval
        run: aoa-4pda eval graph-query-packets

      - name: Run starter hybrid query packet eval
        run: aoa-4pda eval hybrid-query-packets

      - name: Run starter answer packet eval
        run: aoa-4pda eval answer-packets

      - name: Verify agent install route from fresh copy
        run: python scripts/verify_agent_install_route.py --skip-pytest

      - name: Guard against committed heavy artifacts
        run: |
          python - <<'PY'
          import subprocess

          forbidden = {"data", "cache", "artifacts", "raw", "indexes", "vectors", "graphs"}
          forbidden_file_suffixes = (".sqlite", ".sqlite3", ".parquet")
          forbidden_dir_suffixes = (".qdrant", ".lancedb")
          allowed_scaffold = {
            ".connector-state/data/.gitkeep",
            ".connector-state/cache/.gitkeep",
            ".connector-state/artifacts/.gitkeep",
            "kag/indexes/source_inventory.json",
            "kag/indexes/source_surface_index.json",
            "kag/indexes/repo_entity_index.json",
            "kag/indexes/repo_artifact_index.json",
            "kag/indexes/repo_anchor_index.json",
            "kag/indexes/repo_event_index.json",
            "kag/indexes/repo_assertion_index.json",
            "kag/indexes/repo_relation_index.json",
          }
          hits = []
          tracked = subprocess.check_output(["git", "ls-files"], text=True).splitlines()
          for rel in tracked:
              if rel in allowed_scaffold:
                  continue
              parts = rel.split("/")
              if (
                  any(part in forbidden or part.endswith(forbidden_dir_suffixes) for part in parts)
                  or rel.endswith(forbidden_file_suffixes)
              ):
                  hits.append(rel)
          if hits:
              print("tracked forbidden artifact paths:")
              for hit in hits:
                  print(f"- {hit}")
              raise SystemExit(1)
          PY
