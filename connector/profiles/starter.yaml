schema: aoa_4pda_profile_v1
profile_id: starter
description: Tiny policy-safe smoke profile for synthetic fixtures and a future 10-30 topic public starter crawl.
network_default: disabled
max_topics: 30
max_pages_per_topic: 3
max_posts_per_topic: 120
politeness:
  min_delay_seconds: 8
  max_concurrency: 1
routes:
  seed_file: connector/seeds/starter_topics.yaml
  allowlist_manifest: connector/manifests/route_allowlist.yaml
artifacts:
  write_raw_snapshots: true
  build_bm25: true
  build_vector: false
  build_graph: true

